pre-commit:
  parallel: true
  commands:
    go-lint:
      glob: "*.go"
      run: golangci-lint run ./...
    go-test:
      glob: "*.go"
      run: go test ./...
    frontend-typecheck:
      glob: "web/**/*.{ts,tsx}"
      run: cd web && npx tsc --noEmit
    frontend-lint:
      glob: "web/**/*.{ts,tsx}"
      run: cd web && npx eslint .
    frontend-format:
      glob: "web/**/*.{ts,tsx,css,json}"
      run: cd web && npx prettier --check .
    frontend-test:
      glob: "web/**/*.{ts,tsx}"
      run: cd web && npx vitest run
